name: Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Release level (patch, minor, major, or exact version like 0.2.0)"
        required: true
        type: string
      dry-run:
        description: "Dry run (do not actually publish)"
        required: false
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff,cargo-release

      - name: Configure git identity
        run: |
          git config user.name "${{ vars.RELEASE_APP_SLUG }}[bot]"
          git config user.email "${{ vars.RELEASE_APP_ID }}+${{ vars.RELEASE_APP_SLUG }}[bot]@users.noreply.github.com"

      - name: Authenticate with crates.io
        if: inputs.dry-run != true
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-io-auth

      - name: Release
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: |
          FLAGS="${{ inputs.level }}"
          if [ "${{ inputs.dry-run }}" != "true" ]; then
            FLAGS="$FLAGS --execute --no-confirm"
          fi
          cargo release $FLAGS --workspace

      - name: Determine version
        if: inputs.dry-run != true
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "treesitter-types") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: inputs.dry-run != true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git-cliff --tag "v${VERSION}" --latest --output RELEASE_NOTES.md
          gh release create "v${VERSION}" --title "v${VERSION}" --notes-file RELEASE_NOTES.md
