name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff,cargo-edit

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must be in semver format (e.g. 0.2.0)"
            exit 1
          fi

      - name: Dry-run publish all crates
        run: |
          cargo publish --dry-run -p treesitter-types
          cargo publish --dry-run -p treesitter-types-macros
          cargo publish --dry-run -p treesitter-types-bash
          cargo publish --dry-run -p treesitter-types-c
          cargo publish --dry-run -p treesitter-types-c-sharp
          cargo publish --dry-run -p treesitter-types-cpp
          cargo publish --dry-run -p treesitter-types-css
          cargo publish --dry-run -p treesitter-types-elixir
          cargo publish --dry-run -p treesitter-types-go
          cargo publish --dry-run -p treesitter-types-haskell
          cargo publish --dry-run -p treesitter-types-html
          cargo publish --dry-run -p treesitter-types-java
          cargo publish --dry-run -p treesitter-types-javascript
          cargo publish --dry-run -p treesitter-types-json
          cargo publish --dry-run -p treesitter-types-lua
          cargo publish --dry-run -p treesitter-types-markdown
          cargo publish --dry-run -p treesitter-types-ocaml
          cargo publish --dry-run -p treesitter-types-php
          cargo publish --dry-run -p treesitter-types-python
          cargo publish --dry-run -p treesitter-types-regex
          cargo publish --dry-run -p treesitter-types-ruby
          cargo publish --dry-run -p treesitter-types-rust
          cargo publish --dry-run -p treesitter-types-scala
          cargo publish --dry-run -p treesitter-types-swift
          cargo publish --dry-run -p treesitter-types-toml
          cargo publish --dry-run -p treesitter-types-typescript
          cargo publish --dry-run -p treesitter-types-yaml

      - name: Bump versions
        run: cargo set-version --workspace "${{ inputs.version }}"

      - name: Generate release notes
        run: git-cliff --tag "v${{ inputs.version }}" --output RELEASE_NOTES.md

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(release): v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"

      - name: Push
        run: |
          git push origin HEAD:master
          git push origin "v${{ inputs.version }}"

      - name: Publish treesitter-types (base crate)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p treesitter-types

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish treesitter-types-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p treesitter-types-macros

      - name: Publish language crates (batch 1)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p treesitter-types-bash &
          cargo publish -p treesitter-types-c &
          cargo publish -p treesitter-types-c-sharp &
          cargo publish -p treesitter-types-cpp &
          cargo publish -p treesitter-types-css &
          cargo publish -p treesitter-types-elixir &
          cargo publish -p treesitter-types-go &
          cargo publish -p treesitter-types-haskell &
          cargo publish -p treesitter-types-html &
          cargo publish -p treesitter-types-java &
          wait

      - name: Publish language crates (batch 2)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p treesitter-types-javascript &
          cargo publish -p treesitter-types-json &
          cargo publish -p treesitter-types-lua &
          cargo publish -p treesitter-types-markdown &
          cargo publish -p treesitter-types-ocaml &
          cargo publish -p treesitter-types-php &
          cargo publish -p treesitter-types-python &
          cargo publish -p treesitter-types-regex &
          cargo publish -p treesitter-types-ruby &
          cargo publish -p treesitter-types-rust &
          cargo publish -p treesitter-types-scala &
          cargo publish -p treesitter-types-swift &
          cargo publish -p treesitter-types-toml &
          cargo publish -p treesitter-types-typescript &
          cargo publish -p treesitter-types-yaml &
          wait

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${{ inputs.version }}" --title "v${{ inputs.version }}" --notes-file RELEASE_NOTES.md
