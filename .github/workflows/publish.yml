name: Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Release level (patch, minor, major, or exact version like 0.2.0)"
        required: true
        type: string
      dry-run:
        description: "Dry run (do not actually publish)"
        required: false
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff,cargo-release

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Obtain crates.io trusted publishing token
        if: inputs.dry-run != true
        run: |
          OIDC_TOKEN=$(curl -sLS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=crates.io" \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" | jq -r '.value')
          CARGO_REGISTRY_TOKEN=$(curl -sLS 'https://crates.io/api/v1/trusted_publishing/tokens' \
            -X POST -H 'Content-Type: application/json' -d "{\"jwt\": \"$OIDC_TOKEN\"}" | jq -r '.token')
          echo "::add-mask::${CARGO_REGISTRY_TOKEN}"
          echo "CARGO_REGISTRY_TOKEN=${CARGO_REGISTRY_TOKEN}" >> "$GITHUB_ENV"

      - name: Release
        run: |
          FLAGS="${{ inputs.level }}"
          if [ "${{ inputs.dry-run }}" != "true" ]; then
            FLAGS="$FLAGS --execute --no-confirm"
          fi
          cargo release $FLAGS --workspace

      - name: Determine version
        if: inputs.dry-run != true
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "treesitter-types") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: inputs.dry-run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git-cliff --tag "v${VERSION}" --latest --output RELEASE_NOTES.md
          gh release create "v${VERSION}" --title "v${VERSION}" --notes-file RELEASE_NOTES.md
